services:
  db:
    image: postgres:16-alpine
    init: true
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-visionplay}
      POSTGRES_USER: ${POSTGRES_USER:-visionplay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-visionplay}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-visionplay} -d ${POSTGRES_DB:-visionplay}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    init: true
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg2://visionplay:visionplay@db:5432/visionplay}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173,http://localhost:5173}
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-auto}
      YOLO_DEVICE: ${YOLO_DEVICE:-auto}
      YOLO_CONFIDENCE: ${YOLO_CONFIDENCE:-0.25}
      TRACKER_ACTIVATION_THRESHOLD: ${TRACKER_ACTIVATION_THRESHOLD:-0.2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
    volumes:
      - uploads_data:/app/backend/uploads

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    init: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4173/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
